    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; overflow-x: hidden; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
        .modal-overlay { background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); }
        .progress-line-animate { transition: width 1s linear; }
        
        /* Glassmorphism for toast */
        .glass-toast { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
        
        /* Loading Dots Animation */
        @keyframes dot-blink {
            0% { content: ''; }
            33% { content: '.'; }
            66% { content: '..'; }
            100% { content: '...'; }
        }
        .loading-dots::after {
            content: '';
            animation: dot-blink 1.5s infinite steps(1);
        }

        /* Toast Animations */
        @keyframes slideInDown {
            from { transform: translateY(-120%) scale(0.9); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        @keyframes fadeOutUp {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(-30px); opacity: 0; }
        }
        .animate-toast-in { animation: slideInDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-toast-out { animation: fadeOutUp 0.3s ease-in forwards; }
    </style>
</head>
<body class="text-slate-900 font-bold">

    <script type="text/babel">
        // 📘 Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBmxTl0YKC1FGNRd4675ELvsZE86p4HlXg",
            authDomain: "pepstudio-autoform.firebaseapp.com",
            databaseURL: "https://pepstudio-autoform-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "pepstudio-autoform",

            messagingSenderId: "375000310342",
            appId: "1:375000310342:web:87b23ab7e9ce15dcae2047",
            measurementId: "G-WBC5984FVH"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = "autoform-v2-main";

        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        const MAIN_ADMIN_DEFAULT_USER = "Admin";
        const DEFAULT_LOGO_URL = "";

        // Helper functions for STRICT Local Date and Time
        const getLocalDateString = (d = new Date()) => {
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };
        
        const getLocalTimeString = (d = new Date()) => {
            return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}:${String(d.getSeconds()).padStart(2, '0')}`;
        };

        // Formatters for strictly Displaying DD/MM/YYYY and 24h Time
        const formatDisplayDate = (d) => {
            if (!d) return '';
            return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear() + 543}`;
        };

        const formatDisplayTime = (d) => {
            if (!d) return '';
            return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}:${String(d.getSeconds()).padStart(2, '0')}`;
        };

        // Clipboard helper function
        const copyToClipboard = (text, onSuccess) => {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(onSuccess);
            } else {
                let textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                textArea.style.top = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try { document.execCommand('copy'); onSuccess(); } catch (err) {}
                textArea.remove();
            }
        };

        // CSV Export Helper Function
        const downloadCSV = (data, filename) => {
            if (!data || data.length === 0) return alert('ไม่มีข้อมูลสำหรับดาวน์โหลด');
            const keys = Object.keys(data[0]);
            const csvContent = data.map(row => 
                keys.map(k => {
                    let val = row[k];
                    if (val === null || val === undefined) val = '';
                    return `"${String(val).replace(/"/g, '""')}"`;
                }).join(",")
            ).join("\n");
            
            const header = keys.join(",");
            const finalCsv = '\uFEFF' + header + '\n' + csvContent; 
            
            const blob = new Blob([finalCsv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `${filename}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        // Mapping สิทธิ์ภาษาไทย
        const PERMISSION_LABELS = {
            canManageProjects: "จัดการโปรเจกต์",
            canManageTasks: "จัดการคิวงาน (ส่ง)",
            canFillDrafts: "กรอกข้อมูลเบื้องต้น",
            canViewDetails: "ดูรายละเอียดข้อมูล",
            canManageFinance: "จัดการการเงิน",
            canDeleteAnything: "ลบข้อมูลทุกอย่าง"
        };

        // Component: Toast
        const Toast = ({ message, type = 'success', onClose }) => {
            const [isExiting, setIsExiting] = useState(false);
            useEffect(() => {
                const autoClose = setTimeout(() => setIsExiting(true), 3000);
                return () => clearTimeout(autoClose);
            }, []);
            useEffect(() => {
                if (isExiting) {
                    const timer = setTimeout(onClose, 300);
                    return () => clearTimeout(timer);
                }
            }, [isExiting, onClose]);

            const styles = {
                success: "border-green-400/50 text-green-800 glass-toast",
                error: "border-red-400/50 text-red-800 glass-toast",
                info: "border-indigo-400/50 text-indigo-800 glass-toast"
            };

            return (
                <div className={`fixed top-8 left-0 right-0 z-[400] flex justify-center pointer-events-none px-4 ${isExiting ? 'animate-toast-out' : 'animate-toast-in'}`}>
                    <div className={`pointer-events-auto flex items-center gap-3 px-6 py-3 rounded-full border-[1.5px] shadow-2xl ${styles[type]}`}>
                        <div className={`shrink-0 w-8 h-8 rounded-full flex items-center justify-center ${type === 'success' ? 'bg-green-100/80 text-green-600' : type === 'error' ? 'bg-red-100/80 text-red-600' : 'bg-indigo-100/80 text-indigo-600'}`}>
                            <Icon name={type === 'success' ? 'check-circle' : type === 'error' ? 'alert-circle' : 'info'} className="w-4.5 h-4.5" />
                        </div>
                        <span className="text-sm font-black tracking-tight">{message}</span>
                    </div>
                </div>
            );
        };

        // Component: Confirmation Modal
        const ConfirmPopup = ({ isOpen, title, message, onConfirm, onCancel, confirmText = "ยืนยัน", cancelText = "ยกเลิก", type = "info" }) => {
            if (!isOpen) return null;
            const colors = {
                danger: "bg-red-600 hover:bg-red-700 shadow-red-100",
                info: "bg-indigo-600 hover:bg-indigo-700 shadow-indigo-100",
                warning: "bg-amber-500 hover:bg-amber-600 shadow-amber-100"
            };
            return (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 modal-overlay animate-in fade-in duration-200">
                    <div className="bg-white w-full max-w-sm rounded-[40px] shadow-2xl p-8 space-y-6 animate-in zoom-in-95 text-center border border-white/50">
                        <div className={`w-16 h-16 rounded-full mx-auto flex items-center justify-center mb-2 ${type === 'danger' ? 'bg-red-50 text-red-500' : 'bg-indigo-50 text-indigo-500'}`}>
                            <Icon name={type === 'danger' ? 'alert-triangle' : 'help-circle'} className="w-8 h-8" />
                        </div>
                        <div>
                            <h3 className="text-xl font-black text-slate-800 tracking-tight">{title}</h3>
                            <p className="text-slate-400 text-sm mt-2 leading-relaxed font-bold">{message}</p>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={onCancel} className="flex-1 bg-slate-100 text-slate-500 font-bold py-3.5 rounded-2xl hover:bg-slate-200"> {cancelText} </button>
                            <button onClick={onConfirm} className={`flex-1 text-white font-bold py-3.5 rounded-2xl shadow-lg transition-all active:scale-95 font-bold ${colors[type]}`}> {confirmText} </button>
                        </div>
                    </div>
                </div>
            );
        };

        const Icon = ({ name, className = "w-5 h-5" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                    window.lucide.createIcons({ root: iconRef.current });
                }
            }, [name, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const App = () => {
            // Customer Deep Linking State
            const [clientFormId, setClientFormId] = useState(() => new URLSearchParams(window.location.search).get('client_form'));
            const [clientTask, setClientTask] = useState(null);
            const [clientProject, setClientProject] = useState(null);
            const [clientStatus, setClientStatus] = useState('loading'); 

            // State: User & App Load
            const [user, setUser] = useState(null);
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [isAppReady, setIsAppReady] = useState(false); 
            const [currentUserData, setCurrentUserData] = useState(null);
            const [loginUser, setLoginUser] = useState('');
            const [loginPass, setLoginPass] = useState('');
            
            // State: Data
            const [projects, setProjects] = useState([]); 
            const [tasks, setTasks] = useState([]);
            const [allAdmins, setAllAdmins] = useState([]);
            const [financeRecords, setFinanceRecords] = useState([]);
            const [appSettings, setAppSettings] = useState({ 
                logoUrl: localStorage.getItem('pepstudio_cached_logo') || '', 
                siteName: localStorage.getItem('pepstudio_cached_siteName') || 'PepStudio', 
                mainAdminPass: '', 
                mainAdminUser: MAIN_ADMIN_DEFAULT_USER 
            });
            
            const displayLogo = appSettings.logoUrl || DEFAULT_LOGO_URL;

            // State: UI (Navigation & Panels)
            const [activeTab, setActiveTab] = useState('dashboard'); // 'dashboard' or 'workspace'
            const [activeProjectId, setActiveProjectId] = useState(null);
            const [isAddingProject, setIsAddingProject] = useState(false);
            const [isAdminPanelOpen, setIsAdminPanelOpen] = useState(false);
            const [isSettingInitialPass, setIsSettingInitialPass] = useState(false);
            const [isFinanceOpen, setIsFinanceOpen] = useState(false);
            
            const [isEditingAdminModalOpen, setIsEditingAdminModalOpen] = useState(false);
            const [editingAdminId, setEditingAdminId] = useState(null);
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            const [isClearDataOpen, setIsClearDataOpen] = useState(false);
            const [clearOptions, setClearOptions] = useState({ tasks: false, projects: false, finance: false, admins: false });
            
            const [viewStatModal, setViewStatModal] = useState(null);
            const [selectedProjectDetail, setSelectedProjectDetail] = useState(null);
            const [editProjectData, setEditProjectData] = useState(null); // State for editing project details

            // State: Inputs (Main Workspace)
            const [inputUrl, setInputUrl] = useState('');
            const [inputHtml, setInputHtml] = useState('');
            const [inputCustomName, setInputCustomName] = useState('');
            const [taskName, setTaskName] = useState('');
            const [fieldValues, setFieldValues] = useState({});
            const [scheduleDate, setScheduleDate] = useState(getLocalDateString());
            const [scheduleTime, setScheduleTime] = useState('00:00:00'); 
            
            const [currentTime, setCurrentTime] = useState(new Date());
            const [selectedTask, setSelectedTask] = useState(null);
            const [editingTaskId, setEditingTaskId] = useState(null);

            const [isFormModalOpen, setIsFormModalOpen] = useState(false);
            const [generatedLink, setGeneratedLink] = useState(null); 

            const [financeForm, setFinanceForm] = useState({ type: 'income', amount: '', note: '', customerName: '' });
            const [showCustomerSuggestions, setShowCustomerSuggestions] = useState(false);
            const [toastState, setToastState] = useState({ show: false, message: '', type: 'success' });
            const showToast = (message, type = 'success') => setToastState({ show: true, message, type });

            const [adminForm, setAdminForm] = useState({
                username: '', password: '',
                permissions: { canManageProjects: true, canManageTasks: true, canFillDrafts: true, canViewDetails: true, canManageFinance: false, canDeleteAnything: false }
            });

            const [confirmState, setConfirmState] = useState({ isOpen: false, title: '', message: '', onConfirm: null, type: 'info' });

            const triggerConfirm = (title, message, onConfirm, type = 'info') => {
                setConfirmState({ isOpen: true, title, message, type, onConfirm: () => { onConfirm(); setConfirmState(p => ({ ...p, isOpen: false })); } });
            };

            const activeProject = useMemo(() => projects.find(p => p.id === activeProjectId), [projects, activeProjectId]);

            // Summary Calculations for Dashboard
            const dashboardStats = useMemo(() => {
                const totalProjects = projects.length;
                const totalTasks = tasks.length;
                const pendingTasks = tasks.filter(t => t.status === 'pending' || t.status === 'customer_submitted').length;
                const draftTasks = tasks.filter(t => t.status === 'draft' || t.status === 'customer_link_created').length;
                const successTasks = tasks.filter(t => t.status === 'success').length;
                const totalIncome = financeRecords.filter(f => f.type === 'income').reduce((sum, f) => sum + f.amount, 0);
                const totalExpense = financeRecords.filter(f => f.type === 'expense').reduce((sum, f) => sum + f.amount, 0);
                const balance = totalIncome - totalExpense;
                return { totalProjects, totalTasks, pendingTasks, draftTasks, successTasks, totalIncome, totalExpense, balance };
            }, [projects, tasks, financeRecords]);

            // Smart Customer Suggestions for Finance
            const customerSuggestions = useMemo(() => {
                const search = (financeForm.customerName || '').toLowerCase().trim();
                const combinedMatches = [];

                financeRecords.forEach(r => {
                    if (r.customerName && r.customerName.toLowerCase().includes(search)) {
                        combinedMatches.push({ name: r.customerName, note: r.note || 'ประวัติการเงิน', date: r.date, type: 'finance' });
                    }
                });

                tasks.forEach(t => {
                    if (t.taskName && t.taskName.toLowerCase().includes(search)) {
                        combinedMatches.push({ name: t.taskName, note: `คิวงาน: ${t.projectCustomName || t.projectTitle}`, date: t.createdAt, type: 'task' });
                    }
                    if (search.length > 0) {
                        Object.values(t.data || {}).forEach(val => {
                            if (typeof val === 'string' && val.toLowerCase().includes(search) && val.length < 50) {
                                combinedMatches.push({ name: val, note: `ข้อมูลจากคิว: ${t.taskName}`, date: t.createdAt, type: 'task-data' });
                            }
                        });
                    }
                });
                
                const unique = {};
                combinedMatches.forEach(item => {
                    if (!unique[item.name] || (unique[item.name].date && item.date && unique[item.name].date < item.date)) { unique[item.name] = item; }
                });
                
                return Object.values(unique).sort((a,b) => (b.date || 0) - (a.date || 0));
            }, [financeRecords, tasks, financeForm.customerName]);

            // === Initial Load & LocalStorage ===
            useEffect(() => {
                const savedUser = localStorage.getItem('pepstudio_user');
                if (savedUser) {
                    try {
                        setCurrentUserData(JSON.parse(savedUser));
                        setIsLoggedIn(true);
                    } catch(e) {}
                }
                
                auth.signInAnonymously().catch(console.error);
                const unsubscribe = auth.onAuthStateChanged(setUser);
                return () => unsubscribe();
            }, []);

            // === Firebase Main App Logic ===
            useEffect(() => {
                if (appSettings.siteName) document.title = appSettings.siteName;
                if (appSettings.logoUrl) {
                    let link = document.querySelector("link[rel*='icon']") || document.createElement('link');
                    link.rel = 'shortcut icon'; link.href = appSettings.logoUrl;
                    document.getElementsByTagName('head')[0].appendChild(link);
                }
            }, [appSettings]);

            useEffect(() => {
                if (clientFormId) return; 
                if (!user) return;
                
                const publicDataRef = db.collection('artifacts').doc(appId).collection('public').doc('data');
                
                const unsubSettings = publicDataRef.onSnapshot(snap => {
                    if (snap.exists) {
                        const newSettings = snap.data().settings;
                        setAppSettings(prev => ({ ...prev, ...newSettings }));
                        if(newSettings.logoUrl) localStorage.setItem('pepstudio_cached_logo', newSettings.logoUrl);
                        if(newSettings.siteName) localStorage.setItem('pepstudio_cached_siteName', newSettings.siteName);
                    }
                    setTimeout(() => setIsAppReady(true), 400); 
                });

                if (!isLoggedIn) return () => unsubSettings();

                const unsubAdmins = publicDataRef.collection('admins').onSnapshot(snap => {
                    const admins = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setAllAdmins(admins);
                    if (currentUserData?.role !== 'main') {
                        const updatedSelf = admins.find(a => a.username === currentUserData?.username);
                        if (updatedSelf?.status === 'blocked') { 
                            alert('บัญชีถูกระงับการใช้งาน'); 
                            localStorage.removeItem('pepstudio_user');
                            setIsLoggedIn(false); 
                        }
                    }
                });

                const unsubProjects = publicDataRef.collection('projects').onSnapshot(snap => setProjects(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                const unsubTasks = publicDataRef.collection('tasks').onSnapshot(snap => setTasks(snap.docs.map(doc => ({ id: doc.id, ...doc.data(), targetTime: doc.data().targetTime?.toDate(), createdAt: doc.data().createdAt?.toDate() }))));
                const unsubFinance = publicDataRef.collection('finance').onSnapshot(snap => setFinanceRecords(snap.docs.map(doc => ({ id: doc.id, ...doc.data(), date: doc.data().date?.toDate() }))));

                return () => { unsubSettings(); unsubAdmins(); unsubProjects(); unsubTasks(); unsubFinance(); };
            }, [user, isLoggedIn, clientFormId, currentUserData?.username]);

            // === Customer Link Workflow Logic ===
            useEffect(() => {
                if (clientFormId && user) {
                    const taskRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('tasks').doc(clientFormId);
                    taskRef.get().then(doc => {
                        if (doc.exists) {
                            const tData = doc.data();
                            setClientTask({ id: doc.id, ...tData });
                            if (tData.status !== 'customer_link_created') {
                                setClientStatus('already_submitted');
                            } else {
                                db.collection('artifacts').doc(appId).collection('public').doc('data').collection('projects').doc(tData.projectId).get().then(pDoc => {
                                    setClientProject({ id: pDoc.id, ...pDoc.data() });
                                    setFieldValues(tData.data || {});
                                    setClientStatus('ready');
                                });
                            }
                        } else {
                            setClientStatus('not_found');
                        }
                        setIsAppReady(true);
                    }).catch(e => {
                        setClientStatus('error');
                        setIsAppReady(true);
                    });
                }
            }, [clientFormId, user]);

            useEffect(() => {
                if(clientFormId) return;
                const timer = setInterval(() => {
                    const now = new Date(); setCurrentTime(now);
                    tasks.forEach(task => { if (task.status === 'pending' && now >= task.targetTime) submitTask(task); });
                }, 1000);
                return () => clearInterval(timer);
            }, [tasks, clientFormId]);

            // Effect: Global Scroll Lock when ANY modal is open
            useEffect(() => {
                const isAnyModalOpen = 
                    isSettingInitialPass || confirmState.isOpen || isMenuOpen || !!viewStatModal || 
                    isAdminPanelOpen || isEditingAdminModalOpen || isClearDataOpen || isFinanceOpen || 
                    isAddingProject || isFormModalOpen || !!selectedTask || !!generatedLink || !!selectedProjectDetail || !!editProjectData;

                if (isAnyModalOpen) { document.body.style.overflow = 'hidden'; } 
                else { document.body.style.overflow = 'auto'; }
                return () => { document.body.style.overflow = 'auto'; };
            }, [isSettingInitialPass, confirmState.isOpen, isMenuOpen, viewStatModal, isAdminPanelOpen, isEditingAdminModalOpen, isClearDataOpen, isFinanceOpen, isAddingProject, isFormModalOpen, selectedTask, generatedLink, selectedProjectDetail, editProjectData]);

            const submitClientForm = async (e) => {
                e.preventDefault();
                const missingFields = clientProject.fields.filter(f => {
                    if (!f.required) return false;
                    const val = fieldValues[f.entryId];
                    if (Array.isArray(val)) return val.length === 0;
                    return !val || val.toString().trim() === '';
                });
                if (missingFields.length > 0) return alert('กรุณากรอกข้อมูลที่มีเครื่องหมาย * (สีแดง) ให้ครบถ้วน');

                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('tasks').doc(clientFormId).update({
                        data: fieldValues, status: 'customer_submitted', submittedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setClientStatus('success');
                } catch (error) { alert('เกิดข้อผิดพลาดในการบันทึก: ' + error.message); }
            };

            // --- Export Excel Full Feature ---
            const handleExportExcel = (exportType) => {
                if (!window.XLSX) return alert("ไม่สามารถโหลดไลบรารีส่งออกไฟล์ได้");
                
                try {
                    const wb = XLSX.utils.book_new();
                    
                    const createTasksSheet = () => {
                        const filterData = tasks.filter(t => {
                            if(exportType === 'pending') return ['pending', 'draft', 'customer_link_created', 'customer_submitted'].includes(t.status);
                            if(exportType === 'success') return t.status === 'success';
                            return true;
                        });
                        return filterData.map(t => ({
                            "ID คิวงาน": t.id,
                            "ชื่อคิวงาน": t.taskName,
                            "โปรเจกต์": t.projectCustomName || t.projectTitle,
                            "สถานะ": t.status === 'success' ? 'สำเร็จ' : t.status === 'pending' ? 'รอส่ง' : t.status === 'customer_submitted' ? 'ลูกค้าส่งแล้ว' : t.status === 'customer_link_created' ? 'รอลูกค้ากรอก' : 'ร่าง',
                            "เพิ่มเมื่อ": t.createdAt ? `${formatDisplayDate(t.createdAt)} ${formatDisplayTime(t.createdAt)}` : '',
                            "กำหนดส่ง": t.targetTime ? `${formatDisplayDate(t.targetTime)} ${formatDisplayTime(t.targetTime)}` : '',
                            "สร้างโดย": t.createdBy,
                            "ข้อมูลในฟอร์ม": Object.entries(t.data || {}).map(([k,v]) => `${k}:${Array.isArray(v)?v.join(','):v}`).join(' | ')
                        }));
                    };

                    const createFinanceSheet = () => {
                        return financeRecords.map(f => ({
                            "ID รายการ": f.id,
                            "วันที่": f.date ? `${formatDisplayDate(f.date)} ${formatDisplayTime(f.date)}` : '',
                            "ประเภท": f.type === 'income' ? 'รายรับ' : 'รายจ่าย',
                            "จำนวนเงิน": f.amount,
                            "ชื่อลูกค้า/บุคคล": f.customerName,
                            "รายละเอียด": f.note,
                            "บันทึกโดย": f.createdBy
                        }));
                    };

                    const createProjectsSheet = () => {
                        return projects.map(p => ({
                            "ID โปรเจกต์": p.id,
                            "ชื่อโปรเจกต์": p.title,
                            "ชื่อเรียก": p.customName,
                            "สร้างโดย": p.createdBy,
                            "จำนวนฟิลด์": p.fields?.length || 0,
                            "URL": p.url
                        }));
                    };

                    const createAdminsSheet = () => {
                        return allAdmins.map(a => ({
                            "ID": a.id,
                            "Username": a.username,
                            "รหัสผ่าน": a.password,
                            "สถานะ": a.status === 'active' ? 'ใช้งานปกติ' : 'ถูกระงับ',
                            "จัดการโปรเจกต์": a.permissions?.canManageProjects ? 'ใช่' : 'ไม่',
                            "จัดการคิวงาน": a.permissions?.canManageTasks ? 'ใช่' : 'ไม่',
                            "จัดการการเงิน": a.permissions?.canManageFinance ? 'ใช่' : 'ไม่',
                            "ลบข้อมูลได้": a.permissions?.canDeleteAnything ? 'ใช่' : 'ไม่'
                        }));
                    };

                    if (exportType === 'all') {
                        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(createTasksSheet()), "คิวงานทั้งหมด");
                        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(createFinanceSheet()), "ประวัติการเงิน");
                        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(createProjectsSheet()), "โปรเจกต์");
                        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(createAdminsSheet()), "ทีมงาน");
                        XLSX.writeFile(wb, `PepStudio_AllData_Export.xlsx`);
                        showToast('ดาวน์โหลดข้อมูลทั้งหมด (แยกชีท) สำเร็จ');
                    } else {
                        let data = [];
                        let sheetName = "";
                        if (exportType === 'tasks' || exportType === 'pending' || exportType === 'success') { data = createTasksSheet(); sheetName = "คิวงาน"; }
                        else if (exportType === 'finance') { data = createFinanceSheet(); sheetName = "การเงิน"; }
                        else if (exportType === 'projects') { data = createProjectsSheet(); sheetName = "โปรเจกต์"; }
                        else if (exportType === 'admins') { data = createAdminsSheet(); sheetName = "ทีมงาน"; }
                        
                        if(data.length === 0) return alert("ไม่มีข้อมูลสำหรับส่งออก");
                        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data), sheetName);
                        XLSX.writeFile(wb, `PepStudio_${exportType}_Export.xlsx`);
                        showToast('ดาวน์โหลดไฟล์ Excel สำเร็จ');
                    }
                } catch (error) {
                    alert('เกิดข้อผิดพลาดในการส่งออกไฟล์ Excel');

            // --- Handlers ---
            const handleLogin = async (e) => {
                if(e) e.preventDefault();
                const mainUser = appSettings.mainAdminUser || MAIN_ADMIN_DEFAULT_USER;
                
                if (loginUser.toLowerCase() === mainUser.toLowerCase()) {
                    if (!appSettings.mainAdminPass) {
                        const userData = { username: mainUser, role: 'main', permissions: { canManageProjects: true, canManageTasks: true, canFillDrafts: true, canViewDetails: true, canManageFinance: true, canDeleteAnything: true }, status: 'active' };
                        setCurrentUserData(userData);
                        localStorage.setItem('pepstudio_user', JSON.stringify(userData));
                        setIsLoggedIn(true); setIsSettingInitialPass(true);
                    } else if (loginPass === appSettings.mainAdminPass) {
                        const userData = { username: mainUser, role: 'main', permissions: { canManageProjects: true, canManageTasks: true, canFillDrafts: true, canViewDetails: true, canManageFinance: true, canDeleteAnything: true }, status: 'active' };
                        setCurrentUserData(userData);
                        localStorage.setItem('pepstudio_user', JSON.stringify(userData));
                        setIsLoggedIn(true); showToast('ยินดีต้อนรับ แอดมินหลัก', 'success');
                    } else alert('รหัสผ่านไม่ถูกต้อง');
                    return;
                }

                const adminSnap = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('admins').get();
                const foundAdmin = adminSnap.docs.find(doc => doc.data().username === loginUser && doc.data().password === loginPass);
                if (foundAdmin) {
                    const data = foundAdmin.data();
                    if (data.status === 'blocked') return alert('ถูกระงับการใช้งาน');
                    const userData = { id: foundAdmin.id, ...data, role: 'sub' };
                    setCurrentUserData(userData);
                    localStorage.setItem('pepstudio_user', JSON.stringify(userData));
                    setIsLoggedIn(true);
                    showToast(`ยินดีต้อนรับคุณ ${data.username}`);
                } else alert('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง');
            };

            const setMainAdminPassword = async (newPass) => {

                await db.collection('artifacts').doc(appId).collection('public').doc('data').set({ settings: { ...appSettings, mainAdminPass: newPass } }, { merge: true });
                setIsSettingInitialPass(false);
                showToast('ตั้งรหัสผ่านสำเร็จ');
            }

            const openEditAdminModal = (admin) => {
                setEditingAdminId(admin ? admin.id : null);

                setIsEditingAdminModalOpen(true);
            };

            const saveAdmin = async (e) => {

                setIsEditingAdminModalOpen(false); setEditingAdminId(null);
                setAdminForm({ username: '', password: '', permissions: { canManageProjects: true, canManageTasks: true, canFillDrafts: true, canViewDetails: true, canManageFinance: false, canDeleteAnything: false } });
            };

            const updateSettings = async (newSettings) => {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').set({ settings: newSettings }, { merge: true });

            };

            const handleClearDataSubmit = async () => {
                try {
                    const deleteCollection = async (collectionPath) => {
                        const snap = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection(collectionPath).get();
                        const batch = db.batch();
                        snap.docs.forEach(doc => batch.delete(doc.ref));
                        await batch.commit();
                    };
                    if (clearOptions.tasks) await deleteCollection('tasks');
                    if (clearOptions.projects) await deleteCollection('projects');
                    if (clearOptions.finance) await deleteCollection('finance');
                    if (clearOptions.admins) await deleteCollection('admins');
                    showToast('ล้างข้อมูลที่เลือกเรียบร้อยแล้ว');
                    setIsClearDataOpen(false); setClearOptions({ tasks: false, projects: false, finance: false, admins: false });
                } catch (error) { alert('เกิดข้อผิดพลาดในการล้างข้อมูล: ' + error.message); }
            };

            const handleAddProject = async (e) => {
                if(e) e.preventDefault();
                try {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(inputHtml, 'text/html');
                    const scriptWithData = Array.from(doc.querySelectorAll('script')).find(s => s.innerText.includes('FB_PUBLIC_LOAD_DATA_'));
                    if (!scriptWithData) throw new Error('ไม่พบข้อมูลฟอร์ม');
                    const regex = /FB_PUBLIC_LOAD_DATA_ = (.*?);/s;
                    const data = JSON.parse(scriptWithData.innerText.match(regex)[1]);
                    const fields = data[1][1].map(item => {
                        const entryIdSuffix = item[4]?.[0]?.[0]; 
                        const options = item[4]?.[0]?.[1]?.map(opt => opt[0]) || [];
                        const isReq = Boolean(item[4]?.[0]?.[2]); 
                        if (!entryIdSuffix) return null;
                        return { 
                            label: item[1], entryId: `entry.${entryIdSuffix}`, options: options.length > 0 ? options : null, 
                            type: item[3] === 4 ? 'checkbox' : (options.length > 0 ? 'select' : 'text'), required: isReq
                        };
                    }).filter(f => f !== null);
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('projects').add({
                        title: data[1][8] || "ฟอร์มไม่มีชื่อ", customName: inputCustomName || "ไม่มีชื่อเรียก", url: inputUrl, fields, createdBy: currentUserData.username, createdAt: firebase.firestore.Timestamp.fromDate(new Date())
                    });
                    setIsAddingProject(false); setInputHtml(''); setInputUrl(''); setInputCustomName(''); showToast('เพิ่มโปรเจกต์สำเร็จ');
                } catch (err) { alert(err.message); }
            };

            const saveTask = async (isDraft = false) => {
                if (!activeProject) return;
                const target = new Date(`${scheduleDate}T${scheduleTime}`);
                const taskData = {
                    projectId: activeProjectId, projectTitle: activeProject.title, projectCustomName: activeProject.customName, taskName: taskName || 'รายการใหม่', data: fieldValues,
                    targetTime: firebase.firestore.Timestamp.fromDate(target), status: isDraft ? 'draft' : 'pending', url: activeProject.url, createdBy: currentUserData.username
                };

                if (editingTaskId) {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('tasks').doc(editingTaskId).update(taskData);
                    setEditingTaskId(null);
                    showToast('อัปเดต และเข้าคิวส่งสำเร็จ');
                } else {
                    taskData.createdAt = firebase.firestore.Timestamp.fromDate(new Date());
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('tasks').add(taskData);
                    showToast(isDraft ? 'บันทึกแบบร่างสำเร็จ' : 'เพิ่มรายการเข้าคิวส่งแล้ว');
                }

                setTaskName(''); setFieldValues({}); 
                setScheduleDate(getLocalDateString()); setScheduleTime('00:00:00');
            };

            const handleCreateClientLink = async () => {
                if (!activeProject) return showToast('กรุณาเลือกโปรเจกต์', 'error');
                if (!taskName) return showToast('กรุณากรอกชื่อเรียกให้ลูกค้า', 'error');

                const target = new Date(`${scheduleDate}T${scheduleTime}`);
                const docRef = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('tasks').add({
                    projectId: activeProjectId, projectTitle: activeProject.title, projectCustomName: activeProject.customName, taskName: taskName, data: {},
                    createdAt: firebase.firestore.Timestamp.fromDate(new Date()), targetTime: firebase.firestore.Timestamp.fromDate(target),
                    status: 'customer_link_created', url: activeProject.url, createdBy: currentUserData.username
                });

                const link = `${window.location.origin}${window.location.pathname}?client_form=${docRef.id}`;
                setGeneratedLink(link); 
                
                setTaskName(''); setFieldValues({}); 
                setScheduleDate(getLocalDateString()); setScheduleTime('00:00:00');
            };

            const submitTask = async (task) => {
                const taskRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('tasks').doc(task.id);
                await taskRef.update({ status: 'sending' });
                const formBody = new URLSearchParams();
                Object.entries(task.data).forEach(([key, val]) => Array.isArray(val) ? val.forEach(v => formBody.append(key, v)) : formBody.append(key, val));
                try {
                    await fetch(task.url.replace('/viewform', '/formResponse'), { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: formBody.toString() });
                    await taskRef.update({ status: 'success' });
                } catch (err) { await taskRef.update({ status: 'error' }); }
            };

            const addFinanceRecord = async (e) => {
                if(e) e.preventDefault();
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('finance').add({
                    ...financeForm, amount: Number(financeForm.amount), date: firebase.firestore.Timestamp.fromDate(new Date()), createdBy: currentUserData.username
                });
                setFinanceForm({ type: 'income', amount: '', note: '', customerName: '' }); showToast('บันทึกการเงินสำเร็จ');
            };

            const getCountdown = (targetDate) => {
                const diff = targetDate - currentTime; if (diff <= 0) return "00:00:00";
                const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                return `${h}:${m}:${s}`;
            };

            const toggleCheckbox = (entryId, option) => {
                const current = fieldValues[entryId] || [];
                const updated = current.includes(option) ? current.filter(o => o !== option) : [...current, option];
                setFieldValues({ ...fieldValues, [entryId]: updated });
            };

            const getTaskIcon = (status) => {
                if (status === 'success') return { name: 'check-circle', color: 'bg-green-100 text-green-600', dot: 'bg-green-500' };
                if (status === 'draft') return { name: 'file-edit', color: 'bg-slate-100 text-slate-500', dot: 'bg-slate-400' };
                if (status === 'customer_link_created') return { name: 'link', color: 'bg-emerald-100 text-emerald-600', dot: 'bg-emerald-400' };
                if (status === 'customer_submitted') return { name: 'inbox', color: 'bg-indigo-100 text-indigo-600', dot: 'bg-indigo-500' };
                return { name: 'timer', color: 'bg-amber-100 text-amber-600', dot: 'bg-amber-500' }; 
            };

            // Project Edit Logic
            const handleUpdateProject = async (e) => {
                e.preventDefault();
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('projects').doc(editProjectData.id).update({
                        customName: editProjectData.customName,
                        url: editProjectData.url
                    });
                    setEditProjectData(null);
                    showToast('อัปเดตโปรเจกต์สำเร็จ');
                } catch (err) {
                    alert('เกิดข้อผิดพลาด: ' + err.message);
                }
            };

            const handleDeleteProject = () => {
                triggerConfirm("ลบโปรเจกต์", `ลบ ${editProjectData.title} แบบถาวร?`, async () => {
                    try {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('projects').doc(editProjectData.id).delete();
                        if(activeProjectId === editProjectData.id) {
                            setActiveProjectId(null);
                            setFieldValues({});
                            setTaskName('');
                        }
                        setEditProjectData(null);
                        showToast('ลบโปรเจกต์แล้ว');
                    } catch (err) {
                        alert(err.message);
                    }
                }, 'danger');
            };

            // ==========================================
            // RENDER: SPLASH SCREEN (LOADING)
            // ==========================================
            if (!isAppReady) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-white relative overflow-hidden font-bold">
                        <div className="flex flex-col items-center justify-center z-10 w-full animate-in fade-in zoom-in duration-300">
                            <div className="relative mb-4">
                                {displayLogo ? (
                                    <img src={displayLogo} className="w-24 h-24 sm:w-28 sm:h-28 object-cover rounded-full shadow-lg border-2 border-slate-100" />
                                ) : (
                                    <div className="w-24 h-24 sm:w-28 sm:h-28 bg-white rounded-full shadow-lg border-2 border-slate-100"></div>
                                )}
                            </div>
                            <div className="text-indigo-500 font-bold tracking-widest text-xs uppercase mt-2">
                                กำลังโหลดข้อมูล<span className="loading-dots inline-block w-4 text-left"></span>
                            </div>
                        </div>
                    </div>
                );
            }

            // ==========================================
            // RENDER: CLIENT FORM VIEW (No Login Needed)
            // ==========================================
            if (clientFormId) {
                if (clientStatus === 'error' || clientStatus === 'not_found') return (
                    <div className="min-h-screen bg-slate-50 flex flex-col gap-4 items-center justify-center font-black text-red-500 text-center p-6 animate-in zoom-in-95">
                        <div className="w-20 h-20 bg-red-100 text-red-600 rounded-full flex items-center justify-center"><Icon name="file-question" className="w-10 h-10"/></div>
                        <h2 className="text-xl">ไม่พบข้อมูลคิวงาน หรือลิงก์ไม่ถูกต้อง/หมดอายุแล้ว</h2>
                    </div>
                );
                if (clientStatus === 'already_submitted') return (
                    <div className="min-h-screen bg-slate-50 flex flex-col gap-4 items-center justify-center font-black text-slate-800 text-center p-6 animate-in zoom-in-95">
                        <div className="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center"><Icon name="check-circle" className="w-10 h-10"/></div>
                        <h2 className="text-xl">ข้อมูลนี้ถูกส่งไปแล้ว ขอบคุณครับ</h2>
                    </div>
                );
                if (clientStatus === 'success') return (
                    <div className="min-h-screen bg-slate-50 flex flex-col gap-4 items-center justify-center font-black text-slate-800 text-center p-6 animate-in zoom-in-95">
                        <div className="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center"><Icon name="check" className="w-10 h-10"/></div>
                        <h2 className="text-xl">บันทึกข้อมูลสำเร็จ!</h2>
                        <span className="text-sm text-slate-500 font-bold">ผู้ดูแลระบบกำลังดำเนินการตรวจสอบ</span>
                    </div>
                );

                return (
                    <div className="min-h-screen bg-slate-900 py-10 px-4 font-bold overflow-y-auto">
                        <div className="max-w-xl mx-auto bg-white rounded-[40px] shadow-2xl p-8 sm:p-10 text-left animate-in slide-in-from-bottom-4">
                            <div className="flex items-center gap-4 border-b pb-6 mb-6">
                                <div className="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center shrink-0"><Icon name="clipboard-list"/></div>
                                <div>
                                    <h1 className="text-xl font-black text-slate-800">กรอกข้อมูลบริการ</h1>
                                    <p className="text-[11px] font-bold text-slate-400 mt-1 uppercase tracking-widest">{clientTask?.taskName} • {clientProject?.customName}</p>
                                </div>
                            </div>
                            
                            <form onSubmit={submitClientForm} className="space-y-6">
                                {clientProject?.fields.map((f, i) => (
                                    <div key={i} className="space-y-2">
                                        <label className="text-[11px] font-black text-slate-600 block px-1 flex items-center gap-1">
                                            {f.label}
                                            {f.required && <span className="text-red-500 text-sm leading-none">*</span>}
                                        </label>
                                        {f.type === 'checkbox' ? (
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                                {f.options.map((opt, oi) => (
                                                    <label key={oi} className="flex items-center gap-3 p-3 bg-slate-50 rounded-xl cursor-pointer hover:bg-slate-100 transition-all has-[:checked]:border-indigo-100 has-[:checked]:bg-indigo-50/30 border border-transparent">
                                                        <input type="checkbox" className="w-4 h-4 rounded text-indigo-600 font-bold" checked={(fieldValues[f.entryId] || []).includes(opt)} onChange={() => toggleCheckbox(f.entryId, opt)} />
                                                        <span className="text-xs font-bold text-slate-700">{opt}</span>
                                                    </label>
                                                ))}
                                            </div>
                                        ) : f.options ? (
                                            <select value={fieldValues[f.entryId] || ''} onChange={e => setFieldValues({...fieldValues, [f.entryId]: e.target.value})} className="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20width%3D%2220%22%20height%3D%2220%22%20viewBox%3D%220%200%2020%2020%20fill%3D%22none%22%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%3E%3Cpath%20d%3D%22M5%207L10%2012L15%207%22%20stroke%3D%22%2364748B%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22/%3E%3C/svg%3E')] bg-[length:18px_18px] bg-[right:16px_center] bg-no-repeat font-bold focus:ring-2 ring-indigo-100 transition-all text-slate-700">
                                                <option value="">เลือกคำตอบ</option>
                                                {f.options.map((opt, oi) => <option key={oi} value={opt}>{opt}</option>)}
                                            </select>
                                        ) : <input type="text" value={fieldValues[f.entryId] || ''} onChange={e => setFieldValues({...fieldValues, [f.entryId]: e.target.value})} className="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:bg-white focus:ring-2 ring-indigo-100 transition-all font-bold text-slate-700" placeholder={`กรอก ${f.label}`} />}

                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                                <div>
                                                    <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest px-2 block mb-1">จำนวนเงิน (บาท)</label>
                                                    <input type="number" value={financeForm.amount} onChange={e => setFinanceForm({...financeForm, amount: e.target.value})} placeholder="0.00" className="w-full px-5 py-4 bg-slate-50 rounded-2xl outline-none font-black text-2xl text-indigo-900 focus:ring-2 ring-slate-200 transition-all border border-slate-100" required />
                                                </div>
                                                <div>
                                                    <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest px-2 block mb-1">รายละเอียด / หมายเหตุ / โปรเจกต์</label>
                                                    <textarea value={financeForm.note} onChange={e => setFinanceForm({...financeForm, note: e.target.value})} placeholder="ระบุรายละเอียด..." className="w-full px-5 py-4 bg-slate-50 rounded-2xl outline-none h-24 font-bold focus:ring-2 ring-slate-200 transition-all resize-none border border-slate-100" required />
                                                </div>
                                            </div>
                                            <button type="submit" className={`w-full text-white font-black py-4 rounded-3xl shadow-xl hover:scale-[1.02] active:scale-95 transition-all ${financeForm.type === 'income' ? 'bg-green-600 hover:bg-green-700' : 'bg-red-600 hover:bg-red-700'}`}>บันทึกรายการ</button>
                                        </form>
                                        <div className="space-y-4">
                                            <h4 className="text-[10px] font-black text-slate-400 uppercase">ประวัติรายการล่าสุด</h4>
                                            <div className="max-h-[500px] overflow-y-auto pr-2 custom-scrollbar space-y-3">
                                                {financeRecords.length === 0 && <p className="text-xs text-slate-400 p-4 bg-slate-50 rounded-2xl text-center">ยังไม่มีประวัติการเงิน</p>}
                                                {financeRecords.sort((a,b) => b.date - a.date).map(rec => (
                                                    <div key={rec.id} className="p-4 bg-white border border-slate-100 shadow-sm rounded-3xl flex justify-between items-center group transition-all hover:shadow-md">
                                                        <div className="text-left flex items-start gap-3">
                                                            <div className={`w-10 h-10 rounded-full flex items-center justify-center shrink-0 mt-1 ${rec.type === 'income' ? 'bg-green-50 text-green-500' : 'bg-red-50 text-red-500'}`}><Icon name={rec.type === 'income' ? 'arrow-down-left' : 'arrow-up-right'} className="w-5 h-5"/></div>
                                                            <div>
                                                                <div className="text-[9px] text-slate-400 uppercase tracking-wide">{formatDisplayDate(rec.date)} {formatDisplayTime(rec.date)} • ผู้บันทึก: {rec.createdBy}</div>
                                                                <div className="text-sm font-black text-slate-800 leading-tight mt-0.5">{rec.customerName}</div>
                                                                <div className="text-xs font-bold text-slate-500 mt-1">{rec.note}</div>
                                                            </div>
                                                        </div>
                                                        <div className="flex flex-col items-end gap-1 shrink-0">
                                                            <span className={`text-lg font-black ${rec.type === 'income' ? 'text-green-600' : 'text-red-600'}`}> {rec.type === 'income' ? '+' : '-'} {rec.amount.toLocaleString()} </span>
                                                            {currentUserData?.permissions?.canDeleteAnything && <button onClick={() => triggerConfirm("ลบรายการ?", "ลบข้อมูลการเงินนี้ถาวร?", () => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('finance').doc(rec.id).delete(), 'danger')} className="opacity-0 group-hover:opacity-100 text-xs text-red-400 hover:text-red-600 hover:bg-red-50 px-2 py-1 rounded-lg transition-all flex items-center gap-1"><Icon name="trash-2" className="w-3 h-3" /> ลบ</button>}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: ADD PROJECT */}
                    {isAddingProject && (
                        <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 modal-overlay animate-in fade-in">
                            <form onSubmit={(e) => { e.preventDefault(); triggerConfirm("สร้างโปรเจกต์", "สร้างฐานข้อมูลจากฟอร์มนี้?", () => handleAddProject(e)); }} className="bg-white w-full max-w-xl rounded-[40px] shadow-2xl p-10 space-y-6">
                                <h2 className="text-2xl font-black flex items-center gap-3"><Icon name="plus-circle" className="text-indigo-600" /> เพิ่มโปรเจกต์ใหม่</h2>
                                <div className="space-y-4 text-left">
                                    <input type="text" value={inputCustomName} onChange={e => setInputCustomName(e.target.value)} placeholder="ชื่อโปรเจกต์ (ตั้งเอง)" className="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none font-bold focus:ring-2 ring-indigo-100" required />
                                    <input type="text" value={inputUrl} onChange={e => setInputUrl(e.target.value)} placeholder="URL ลิงก์ฟอร์ม" className="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none font-bold focus:ring-2 ring-indigo-100" required />
                                    <textarea value={inputHtml} onChange={e => setInputHtml(e.target.value)} placeholder="HTML Source Code (Ctrl+U)" className="w-full h-32 px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none font-mono text-[10px] focus:ring-2 ring-indigo-100" required />
                                </div>
                                <div className="flex gap-3">
                                    <button type="button" onClick={() => setIsAddingProject(false)} className="flex-1 bg-slate-100 text-slate-600 py-4 rounded-2xl font-black hover:bg-slate-200">ยกเลิก</button>
                                    <button type="submit" className="flex-[2] bg-indigo-600 text-white py-4 rounded-2xl shadow-xl font-black hover:bg-indigo-700 active:scale-95 transition-all">สร้างโปรเจกต์</button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* MODAL: VIEW TASK DATA */}
                    {selectedTask && (
                        <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 modal-overlay animate-in fade-in">
                            <div className="bg-white w-full max-w-md rounded-[40px] shadow-2xl flex flex-col max-h-[85vh] overflow-hidden" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center border-b p-8 bg-white shrink-0">
                                    <div className="text-left">
                                        <h2 className="text-xl font-black text-slate-800">{selectedTask.taskName}</h2>
                                        <span className="text-[10px] text-slate-400 uppercase tracking-widest">{selectedTask.projectCustomName}</span>
                                    </div>
                                    <button onClick={() => setSelectedTask(null)} className="w-10 h-10 flex items-center justify-center shrink-0 hover:bg-slate-200 rounded-full bg-white shadow-sm border border-slate-200 transition-all"><Icon name="x" className="w-5 h-5 text-slate-500" /></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-10 pt-6 custom-scrollbar text-left">
                                    {projects.find(p => p.id === selectedTask.projectId)?.fields.map((f, i) => (
                                        <div key={i} className="bg-slate-50/50 p-4 rounded-3xl border border-slate-50 mb-3 hover:bg-slate-50 transition-all">
                                            <div className="text-[10px] text-slate-400 font-bold tracking-wide flex items-center gap-1">{f.label} {f.required && <span className="text-red-500">*</span>}</div>
                                            <div className="text-sm font-black text-slate-700 mt-1">{Array.isArray(selectedTask.data[f.entryId]) ? selectedTask.data[f.entryId].join(', ') : (selectedTask.data[f.entryId] || '(ว่าง)')}</div>
                                        </div>
                                    ))}
                                </div>
                                <div className="flex flex-col shrink-0">
                                    {/* Action Buttons Row */}
                                    {(['customer_link_created', 'customer_submitted', 'draft'].includes(selectedTask.status)) && (
                                        <div className="flex flex-row border-t border-slate-100">
                                            {selectedTask.status === 'customer_link_created' && (
                                                <button onClick={() => {
                                                    const link = `${window.location.origin}${window.location.pathname}?client_form=${selectedTask.id}`;
                                                    copyToClipboard(link, () => showToast('คัดลอกลิงก์แล้ว'));
                                                }} className="flex-1 bg-emerald-50 text-emerald-600 font-black hover:bg-emerald-600 hover:text-white transition-all flex items-center justify-center gap-2 p-4 sm:p-5 border-r border-white">
                                                    <Icon name="copy" className="w-4 h-4"/> คัดลอกลิงก์ใหม่
                                                </button>
                                            )}

                                            {['customer_submitted', 'draft', 'customer_link_created'].includes(selectedTask.status) && (
                                                <button onClick={() => {
                                                    setTaskName(selectedTask.taskName);
                                                    setScheduleDate(getLocalDateString(selectedTask.targetTime));
                                                    setScheduleTime(getLocalTimeString(selectedTask.targetTime));
                                                    setFieldValues(selectedTask.data || {});
                                                    setEditingTaskId(selectedTask.id);
                                                    setActiveProjectId(selectedTask.projectId);
                                                    setSelectedTask(null);
                                                }} className="flex-1 bg-indigo-50 text-indigo-600 font-black hover:bg-indigo-600 hover:text-white transition-all flex items-center justify-center gap-2 p-4 sm:p-5">
                                                    <Icon name="edit" className="w-4 h-4"/> ตรวจสอบ / แก้ไข
                                                </button>
                                            )}
                                        </div>
                                    )}

                                    {/* Task Info Row */}
                                    <div className="w-full text-[10px] text-slate-400 font-bold uppercase p-4 tracking-widest text-center leading-relaxed border-t border-slate-100 bg-slate-50">
                                        สร้างโดย {selectedTask.createdBy} <br/> 
                                        ส่ง {formatDisplayDate(selectedTask.targetTime)} {formatDisplayTime(selectedTask.targetTime)}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: FILL FORM DATA */}
                    {isFormModalOpen && activeProject && (
                        <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 modal-overlay animate-in fade-in">
                            <div className="bg-white w-full max-w-2xl rounded-[40px] shadow-2xl flex flex-col max-h-[90vh] overflow-hidden">
                                <div className="flex justify-between items-center border-b p-8 bg-slate-50 shrink-0">
                                    <div className="text-left">
                                        <h2 className="text-xl font-black text-slate-800 flex items-center gap-3"><Icon name="file-edit" className="text-indigo-600"/> กรอกข้อมูลฟอร์ม</h2>
                                        <span className="text-[10px] text-slate-400 uppercase tracking-widest ml-9">{activeProject.title}</span>
                                    </div>
                                    <button type="button" onClick={() => setIsFormModalOpen(false)} className="w-10 h-10 flex items-center justify-center shrink-0 hover:bg-slate-200 rounded-full bg-white shadow-sm border border-slate-200 transition-all"><Icon name="x" className="w-5 h-5 text-slate-500" /></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-8 custom-scrollbar text-left bg-white space-y-6">
                                    {activeProject.fields.map((f, i) => (
                                        <div key={i} className="space-y-2">
                                            <label className="text-[11px] font-black text-slate-600 block px-1 flex items-center gap-1">
                                                {f.label}
                                                {f.required && <span className="text-red-500 text-sm leading-none">*</span>}
                                            </label>
                                            {f.type === 'checkbox' ? (
                                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                                    {f.options.map((opt, oi) => (
                                                        <label key={oi} className="flex items-center gap-3 p-3 bg-slate-50 rounded-xl cursor-pointer hover:bg-slate-100 transition-all has-[:checked]:border-indigo-100 has-[:checked]:bg-indigo-50/30 border border-transparent">
                                                            <input type="checkbox" className="w-4 h-4 rounded text-indigo-600 font-bold" checked={(fieldValues[f.entryId] || []).includes(opt)} onChange={() => toggleCheckbox(f.entryId, opt)} />
                                                            <span className="text-xs font-bold text-slate-700">{opt}</span>
                                                        </label>
                                                    ))}
                                                </div>
                                            ) : f.options ? (
                                                <select value={fieldValues[f.entryId] || ''} onChange={e => setFieldValues({...fieldValues, [f.entryId]: e.target.value})} className="w-full px-5 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl outline-none appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20width%3D%2220%22%20height%3D%2220%22%20viewBox%3D%220%200%2020%2020%20fill%3D%22none%22%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%3E%3Cpath%20d%3D%22M5%207L10%2012L15%207%22%20stroke%3D%22%2364748B%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22/%3E%3C/svg%3E')] bg-[length:18px_18px] bg-[right:16px_center] bg-no-repeat font-bold focus:ring-2 ring-indigo-100 transition-all">
                                                    <option value="">เลือกคำตอบ</option>
                                                    {f.options.map((opt, oi) => <option key={oi} value={opt}>{opt}</option>)}
                                                </select>
                                            ) : <input type="text" value={fieldValues[f.entryId] || ''} onChange={e => setFieldValues({...fieldValues, [f.entryId]: e.target.value})} className="w-full px-5 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:bg-white focus:ring-2 ring-indigo-100 transition-all font-bold" />}
                                        </div>
                                    ))}
                                </div>
                                <div className="p-6 border-t bg-white shrink-0">
                                    <button type="button" onClick={() => setIsFormModalOpen(false)} className="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-xl hover:bg-indigo-700 active:scale-95 transition-all">เสร็จสิ้น (กลับไปตั้งเวลา)</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
