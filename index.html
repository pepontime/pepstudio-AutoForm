<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PepStudio - Enterprise Management</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; overflow-x: hidden; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
        .modal-overlay { background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); }
        .progress-line-animate { transition: width 1s linear; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.4); }
        
        /* Toast Animation */
        @keyframes slideInDown {
            from { transform: translateY(-120%) scale(0.9); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        @keyframes fadeOutUp {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(-30px); opacity: 0; }
        }
        .animate-toast-in { animation: slideInDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-toast-out { animation: fadeOutUp 0.3s ease-in forwards; }
    </style>
</head>
<body class="text-slate-900 font-bold">
    <div id="root"></div>

    <script type="text/babel">
        // 📘 Firebase Configuration (Updated)
        const firebaseConfig = {
            apiKey: "AIzaSyBmxTl0YKC1FGNRd4675ELvsZE86p4HlXg",
            authDomain: "pepstudio-autoform.firebaseapp.com",
            databaseURL: "https://pepstudio-autoform-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "pepstudio-autoform",
            storageBucket: "pepstudio-autoform.firebasestorage.app",
            messagingSenderId: "375000310342",
            appId: "1:375000310342:web:87b23ab7e9ce15dcae2047",
            measurementId: "G-WBC5984FVH"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = "autoform-v2-main";

        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        const MAIN_ADMIN_DEFAULT_USER = "Admin";

        // Mapping สิทธิ์ภาษาไทย
        const PERMISSION_LABELS = {
            canManageProjects: "จัดการโปรเจกต์",
            canManageTasks: "จัดการคิวงาน (ส่ง)",
            canFillDrafts: "กรอกข้อมูลเบื้องต้น",
            canViewDetails: "ดูรายละเอียดข้อมูล",
            canManageFinance: "จัดการการเงิน",
            canDeleteAnything: "ลบข้อมูลทุกอย่าง"
        };

        // Component: Toast (Premium Capsule Style)
        const Toast = ({ message, type = 'success', onClose }) => {
            const [isExiting, setIsExiting] = useState(false);
            useEffect(() => {
                const autoClose = setTimeout(() => setIsExiting(true), 3000);
                return () => clearTimeout(autoClose);
            }, []);
            useEffect(() => {
                if (isExiting) {
                    const timer = setTimeout(onClose, 300);
                    return () => clearTimeout(timer);
                }
            }, [isExiting, onClose]);

            const styles = {
                success: "border-green-500/30 text-green-700 bg-white/90",
                error: "border-red-500/30 text-red-700 bg-white/90",
                info: "border-indigo-500/30 text-indigo-700 bg-white/90"
            };

            return (
                <div className={`fixed top-8 left-0 right-0 z-[300] flex justify-center pointer-events-none px-4 ${isExiting ? 'animate-toast-out' : 'animate-toast-in'}`}>
                    <div className={`pointer-events-auto flex items-center gap-3 px-8 py-3.5 rounded-full backdrop-blur-2xl border shadow-2xl ${styles[type]}`}>
                        <div className={`shrink-0 w-8 h-8 rounded-full flex items-center justify-center ${type === 'success' ? 'bg-green-50' : type === 'error' ? 'bg-red-50' : 'bg-indigo-50'}`}>
                            <Icon name={type === 'success' ? 'check-circle' : type === 'error' ? 'alert-circle' : 'info'} className="w-4.5 h-4.5" />
                        </div>
                        <span className="text-sm font-black tracking-tight">{message}</span>
                    </div>
                </div>
            );
        };

        // Component: Confirmation Modal
        const ConfirmPopup = ({ isOpen, title, message, onConfirm, onCancel, confirmText = "ยืนยัน", cancelText = "ยกเลิก", type = "info" }) => {
            if (!isOpen) return null;
            const colors = {
                danger: "bg-red-600 hover:bg-red-700 shadow-red-100",
                info: "bg-indigo-600 hover:bg-indigo-700 shadow-indigo-100",
                warning: "bg-amber-500 hover:bg-amber-600 shadow-amber-100"
            };
            return (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 modal-overlay animate-in fade-in duration-200">
                    <div className="bg-white w-full max-w-sm rounded-[40px] shadow-2xl p-8 space-y-6 animate-in zoom-in-95 text-center border border-white/50">
                        <div className={`w-16 h-16 rounded-full mx-auto flex items-center justify-center mb-2 ${type === 'danger' ? 'bg-red-50 text-red-500' : 'bg-indigo-50 text-indigo-500'}`}>
                            <Icon name={type === 'danger' ? 'alert-triangle' : 'help-circle'} className="w-8 h-8" />
                        </div>
                        <div>
                            <h3 className="text-xl font-black text-slate-800 tracking-tight">{title}</h3>
                            <p className="text-slate-400 text-sm mt-2 leading-relaxed font-bold">{message}</p>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={onCancel} className="flex-1 bg-slate-100 text-slate-500 font-bold py-3.5 rounded-2xl hover:bg-slate-200"> {cancelText} </button>
                            <button onClick={onConfirm} className={`flex-1 text-white font-bold py-3.5 rounded-2xl shadow-lg transition-all active:scale-95 font-bold ${colors[type]}`}> {confirmText} </button>
                        </div>
                    </div>
                </div>
            );
        };

        const Icon = ({ name, className = "w-5 h-5" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                    window.lucide.createIcons({ root: iconRef.current });
                }
            }, [name, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const App = () => {
            // State: User & Data
            const [user, setUser] = useState(null);
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [currentUserData, setCurrentUserData] = useState(null);
            const [loginUser, setLoginUser] = useState('');
            const [loginPass, setLoginPass] = useState('');
            
            const [projects, setProjects] = useState([]); 
            const [tasks, setTasks] = useState([]);
            const [allAdmins, setAllAdmins] = useState([]);
            const [financeRecords, setFinanceRecords] = useState([]);
            const [appSettings, setAppSettings] = useState({ logoUrl: '', siteName: 'PepStudio', mainAdminPass: '', mainAdminUser: MAIN_ADMIN_DEFAULT_USER });
            
            // State: UI (Navigation & Panels)
            const [activeTab, setActiveTab] = useState('dashboard'); // 'dashboard' or 'workspace'
            const [activeProjectId, setActiveProjectId] = useState(null);
            const [isAddingProject, setIsAddingProject] = useState(false);
            const [isAdminPanelOpen, setIsAdminPanelOpen] = useState(false);
            const [isSettingInitialPass, setIsSettingInitialPass] = useState(false);
            const [isFinanceOpen, setIsFinanceOpen] = useState(false);
            
            const [isEditingAdminModalOpen, setIsEditingAdminModalOpen] = useState(false); // New Popup State
            const [editingAdminId, setEditingAdminId] = useState(null);
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            const [isClearDataOpen, setIsClearDataOpen] = useState(false); // Data Clear Popup
            const [clearOptions, setClearOptions] = useState({ tasks: false, projects: false, finance: false, admins: false });
            
            const [viewStatModal, setViewStatModal] = useState(null); // 'projects', 'tasks', 'pending', 'success', 'admins'

            // State: Inputs
            const [inputUrl, setInputUrl] = useState('');
            const [inputHtml, setInputHtml] = useState('');
            const [inputCustomName, setInputCustomName] = useState('');
            const [taskName, setTaskName] = useState('');
            const [fieldValues, setFieldValues] = useState({});
            const [scheduleDate, setScheduleDate] = useState(new Date().toISOString().split('T')[0]);
            const [scheduleTime, setScheduleTime] = useState('00:00:00');
            const [currentTime, setCurrentTime] = useState(new Date());
            const [selectedTask, setSelectedTask] = useState(null);

            const [financeForm, setFinanceForm] = useState({ type: 'income', amount: '', note: '', customerName: '' });
            const [showCustomerSuggestions, setShowCustomerSuggestions] = useState(false);
            const [toastState, setToastState] = useState({ show: false, message: '', type: 'success' });
            const showToast = (message, type = 'success') => setToastState({ show: true, message, type });

            const [adminForm, setAdminForm] = useState({
                username: '', password: '',
                permissions: { canManageProjects: true, canManageTasks: true, canFillDrafts: true, canViewDetails: true, canManageFinance: false, canDeleteAnything: false }
            });

            const [confirmState, setConfirmState] = useState({ isOpen: false, title: '', message: '', onConfirm: null, type: 'info' });

            const triggerConfirm = (title, message, onConfirm, type = 'info') => {
                setConfirmState({ isOpen: true, title, message, type, onConfirm: () => { onConfirm(); setConfirmState(p => ({ ...p, isOpen: false })); } });
            };

            const activeProject = useMemo(() => projects.find(p => p.id === activeProjectId), [projects, activeProjectId]);

            // Summary Calculations for Dashboard
            const dashboardStats = useMemo(() => {
                const totalProjects = projects.length;
                const totalTasks = tasks.length;
                const pendingTasks = tasks.filter(t => t.status === 'pending').length;
                const draftTasks = tasks.filter(t => t.status === 'draft').length;
                const successTasks = tasks.filter(t => t.status === 'success').length;
                const totalIncome = financeRecords.filter(f => f.type === 'income').reduce((sum, f) => sum + f.amount, 0);
                const totalExpense = financeRecords.filter(f => f.type === 'expense').reduce((sum, f) => sum + f.amount, 0);
                const balance = totalIncome - totalExpense;
                return { totalProjects, totalTasks, pendingTasks, draftTasks, successTasks, totalIncome, totalExpense, balance };
            }, [projects, tasks, financeRecords]);

            // Smart Customer Suggestions for Finance (ดึงจากทั้ง การเงิน และ คิวงาน)
            const customerSuggestions = useMemo(() => {
                const search = (financeForm.customerName || '').toLowerCase().trim();
                const combinedMatches = [];

                // 1. ค้นหาจากประวัติการเงินเดิม
                financeRecords.forEach(r => {
                    if (r.customerName && r.customerName.toLowerCase().includes(search)) {
                        combinedMatches.push({
                            name: r.customerName,
                            note: r.note || 'ประวัติการเงิน',
                            date: r.date,
                            type: 'finance'
                        });
                    }
                });

                // 2. ค้นหาจากคิวงาน (ทั้งชื่อคิวงาน และข้อมูลในฟอร์ม)
                tasks.forEach(t => {
                    // หาจากชื่อคิวงาน
                    if (t.taskName && t.taskName.toLowerCase().includes(search)) {
                        combinedMatches.push({
                            name: t.taskName,
                            note: `คิวงาน: ${t.projectCustomName || t.projectTitle}`,
                            date: t.createdAt,
                            type: 'task'
                        });
                    }
                    
                    // หาจากข้อมูลที่กรอกในฟอร์ม (Deep Search) - ทำงานเมื่อมีการพิมพ์ค้นหาอย่างน้อย 1 ตัวอักษร
                    if (search.length > 0) {
                        Object.values(t.data || {}).forEach(val => {
                            // ค้นหาเฉพาะข้อมูลที่เป็นข้อความและไม่ยาวจนเกินไป (ตัดพวก note ยาวๆ ออก)
                            if (typeof val === 'string' && val.toLowerCase().includes(search) && val.length < 50) {
                                combinedMatches.push({
                                    name: val,
                                    note: `ข้อมูลจากคิว: ${t.taskName}`,
                                    date: t.createdAt,
                                    type: 'task-data'
                                });
                            }
                        });
                    }
                });
                
                // กรองข้อมูลชื่อซ้ำ (ดึงแค่อันล่าสุดมาแสดง)
                const unique = {};
                combinedMatches.forEach(item => {
                    if (!unique[item.name] || (unique[item.name].date && item.date && unique[item.name].date < item.date)) {
                        unique[item.name] = item;
                    }
                });
                
                return Object.values(unique).sort((a,b) => (b.date || 0) - (a.date || 0));
            }, [financeRecords, tasks, financeForm.customerName]);

            // Firebase Logic
            useEffect(() => {
                if (appSettings.siteName) document.title = appSettings.siteName;
                if (appSettings.logoUrl) {
                    let link = document.querySelector("link[rel*='icon']") || document.createElement('link');
                    link.rel = 'shortcut icon'; link.href = appSettings.logoUrl;
                    document.getElementsByTagName('head')[0].appendChild(link);
                }
            }, [appSettings]);

            useEffect(() => {
                auth.signInAnonymously().catch(console.error);
                const unsubscribe = auth.onAuthStateChanged(setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const publicDataRef = db.collection('artifacts').doc(appId).collection('public').doc('data');
                
                const unsubSettings = publicDataRef.onSnapshot(snap => {
                    if (snap.exists) setAppSettings(prev => ({ ...prev, ...snap.data().settings }));
                });

                if (!isLoggedIn) return () => unsubSettings();

                const unsubAdmins = publicDataRef.collection('admins').onSnapshot(snap => {
                    const admins = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setAllAdmins(admins);
                    if (currentUserData?.role !== 'main') {
                        const updatedSelf = admins.find(a => a.username === currentUserData.username);
                        if (updatedSelf?.status === 'blocked') { alert('บัญชีถูกระงับการใช้งาน'); setIsLoggedIn(false); }
                    }
                });

                const unsubProjects = publicDataRef.collection('projects').onSnapshot(snap => setProjects(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                const unsubTasks = publicDataRef.collection('tasks').onSnapshot(snap => setTasks(snap.docs.map(doc => ({ id: doc.id, ...doc.data(), targetTime: doc.data().targetTime?.toDate(), createdAt: doc.data().createdAt?.toDate() }))));
                const unsubFinance = publicDataRef.collection('finance').onSnapshot(snap => setFinanceRecords(snap.docs.map(doc => ({ id: doc.id, ...doc.data(), date: doc.data().date?.toDate() }))));

                return () => { unsubSettings(); unsubAdmins(); unsubProjects(); unsubTasks(); unsubFinance(); };
            }, [user, isLoggedIn]);

            useEffect(() => {
                const timer = setInterval(() => {
                    const now = new Date(); setCurrentTime(now);
                    tasks.forEach(task => { if (task.status === 'pending' && now >= task.targetTime) submitTask(task); });
                }, 1000);
                return () => clearInterval(timer);
            }, [tasks]);

            // Handlers
            const handleLogin = async (e) => {
                if(e) e.preventDefault();
                const mainUser = appSettings.mainAdminUser || MAIN_ADMIN_DEFAULT_USER;
                
                if (loginUser.toLowerCase() === mainUser.toLowerCase()) {
                    if (!appSettings.mainAdminPass) {
                        setCurrentUserData({ username: mainUser, role: 'main', permissions: { canManageProjects: true, canManageTasks: true, canFillDrafts: true, canViewDetails: true, canManageFinance: true, canDeleteAnything: true }, status: 'active' });
                        setIsLoggedIn(true); setIsSettingInitialPass(true);
                    } else if (loginPass === appSettings.mainAdminPass) {
                        setCurrentUserData({ username: mainUser, role: 'main', permissions: { canManageProjects: true, canManageTasks: true, canFillDrafts: true, canViewDetails: true, canManageFinance: true, canDeleteAnything: true }, status: 'active' });
                        setIsLoggedIn(true); showToast('ยินดีต้อนรับ แอดมินหลัก', 'success');
                    } else alert('รหัสผ่านไม่ถูกต้อง');
                    return;
                }

                const adminSnap = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('admins').get();
                const foundAdmin = adminSnap.docs.find(doc => doc.data().username === loginUser && doc.data().password === loginPass);
                if (foundAdmin) {
                    const data = foundAdmin.data();
                    if (data.status === 'blocked') return alert('ถูกระงับการใช้งาน');
                    setCurrentUserData({ id: foundAdmin.id, ...data, role: 'sub' }); setIsLoggedIn(true);
                    showToast(`ยินดีต้อนรับคุณ ${data.username}`);
                } else alert('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง');
            };

            const setMainAdminPassword = async (newPass) => {
                if (!newPass) return alert('กรุณากรอกรหัสผ่าน');
                await db.collection('artifacts').doc(appId).collection('public').doc('data').set({ settings: { ...appSettings, mainAdminPass: newPass } }, { merge: true });
                setIsSettingInitialPass(false);
                showToast('ตั้งรหัสผ่านสำเร็จ');
            }

            const openEditAdminModal = (admin) => {
                setEditingAdminId(admin ? admin.id : null);
                if (admin) {
                    setAdminForm({ username: admin.username, password: admin.password, permissions: admin.permissions });
                } else {
                    setAdminForm({ username: '', password: '', permissions: { canManageProjects: true, canManageTasks: true, canFillDrafts: true, canViewDetails: true, canManageFinance: false, canDeleteAnything: false } });
                }
                setIsEditingAdminModalOpen(true);
            };

            const saveAdmin = async (e) => {
                if(e) e.preventDefault();
                const colRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('admins');
                
                if (editingAdminId) {
                    await colRef.doc(editingAdminId).update(adminForm);
                    showToast('อัปเดตข้อมูลสำเร็จ');
                } else {
                    await colRef.add({ ...adminForm, status: 'active', createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                    showToast('เพิ่มแอดมินรองสำเร็จ');
                }
                setIsEditingAdminModalOpen(false);
                setEditingAdminId(null);
                setAdminForm({ username: '', password: '', permissions: { canManageProjects: true, canManageTasks: true, canFillDrafts: true, canViewDetails: true, canManageFinance: false, canDeleteAnything: false } });
            };

            const updateSettings = async (newSettings) => {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').set({ settings: newSettings }, { merge: true });
                showToast('บันทึกข้อมูลสำเร็จ');
            };

            const handleClearDataSubmit = async () => {
                try {
                    const deleteCollection = async (collectionPath) => {
                        const snap = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection(collectionPath).get();
                        const batch = db.batch();
                        snap.docs.forEach(doc => batch.delete(doc.ref));
                        await batch.commit();
                    };

                    if (clearOptions.tasks) await deleteCollection('tasks');
                    if (clearOptions.projects) await deleteCollection('projects');
                    if (clearOptions.finance) await deleteCollection('finance');
                    if (clearOptions.admins) await deleteCollection('admins');
                    
                    showToast('ล้างข้อมูลที่เลือกเรียบร้อยแล้ว');
                    setIsClearDataOpen(false);
                    setClearOptions({ tasks: false, projects: false, finance: false, admins: false });
                } catch (error) {
                    alert('เกิดข้อผิดพลาดในการล้างข้อมูล: ' + error.message);
                }
            };

            const handleAddProject = async (e) => {
                if(e) e.preventDefault();
                try {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(inputHtml, 'text/html');
                    const scriptWithData = Array.from(doc.querySelectorAll('script')).find(s => s.innerText.includes('FB_PUBLIC_LOAD_DATA_'));
                    if (!scriptWithData) throw new Error('ไม่พบข้อมูลฟอร์ม');
                    const regex = /FB_PUBLIC_LOAD_DATA_ = (.*?);/s;
                    const data = JSON.parse(scriptWithData.innerText.match(regex)[1]);
                    const fields = data[1][1].map(item => {
                        const entryIdSuffix = item[4]?.[0]?.[0]; const options = item[4]?.[0]?.[1]?.map(opt => opt[0]) || [];
                        if (!entryIdSuffix) return null;
                        return { label: item[1], entryId: `entry.${entryIdSuffix}`, options: options.length > 0 ? options : null, type: item[3] === 4 ? 'checkbox' : (options.length > 0 ? 'select' : 'text') };
                    }).filter(f => f !== null);
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('projects').add({
                        title: data[1][8] || "ฟอร์มไม่มีชื่อ", customName: inputCustomName || "ไม่มีชื่อเรียก", url: inputUrl, fields, createdBy: currentUserData.username
                    });
                    setIsAddingProject(false); setInputHtml(''); setInputUrl(''); setInputCustomName(''); showToast('เพิ่มโปรเจกต์สำเร็จ');
                } catch (err) { alert(err.message); }
            };

            const addTaskToQueue = async (isDraft = false) => {
                if (!activeProject) return;
                const target = new Date(`${scheduleDate}T${scheduleTime}`);
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('tasks').add({
                    projectId: activeProjectId, projectTitle: activeProject.title, projectCustomName: activeProject.customName, taskName: taskName || 'รายการใหม่', data: fieldValues,
                    createdAt: firebase.firestore.Timestamp.fromDate(new Date()), targetTime: firebase.firestore.Timestamp.fromDate(target),
                    status: isDraft ? 'draft' : 'pending', url: activeProject.url, createdBy: currentUserData.username
                });
                setTaskName(''); setFieldValues({}); showToast(isDraft ? 'บันทึกแบบร่างสำเร็จ' : 'เพิ่มรายการเข้าคิวส่งแล้ว');
            };

            const submitTask = async (task) => {
                const taskRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('tasks').doc(task.id);
                await taskRef.update({ status: 'sending' });
                const formBody = new URLSearchParams();

                                    <label className="flex items-center gap-3 p-3 bg-red-50 rounded-xl cursor-pointer border border-red-100">
                                        <input type="checkbox" className="w-5 h-5 accent-red-600" checked={clearOptions.admins} onChange={e => setClearOptions({...clearOptions, admins: e.target.checked})} />
                                        <span className="text-red-700 font-black">ลบทีมงาน (แอดมินรอง) ทั้งหมด</span>
                                    </label>
                                </div>

                                <div className="flex gap-3 pt-4">
                                    <button onClick={() => setIsClearDataOpen(false)} className="flex-1 bg-slate-100 text-slate-600 py-3.5 rounded-2xl font-black">ยกเลิก</button>
                                    <button 
                                        onClick={() => {
                                            if(!clearOptions.tasks && !clearOptions.projects && !clearOptions.finance && !clearOptions.admins) return alert('กรุณาเลือกข้อมูลที่ต้องการล้างอย่างน้อย 1 รายการ');
                                            triggerConfirm("ยืนยันการล้างข้อมูล", "คุณแน่ใจหรือไม่ว่าต้องการลบข้อมูลที่เลือกอย่างถาวร?", handleClearDataSubmit, 'danger');
                                        }} 
                                        className="flex-[2] bg-red-600 text-white py-3.5 rounded-2xl font-black shadow-lg hover:bg-red-700 active:scale-95"
                                    >
                                        ยืนยันการล้างข้อมูล
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* FINANCE MODAL */}
                    {isFinanceOpen && (
                        <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 modal-overlay animate-in fade-in">
                            <div className="bg-white w-full max-w-4xl rounded-[40px] shadow-2xl flex flex-col max-h-[90vh] overflow-hidden">
                                <div className="flex justify-between items-center border-b p-8 bg-white shrink-0">
                                    <h2 className="text-2xl font-black flex items-center gap-3 tracking-tight"><Icon name="dollar-sign" className="text-green-600" /> จัดการการเงิน</h2>
                                    <button onClick={() => setIsFinanceOpen(false)} className="p-2 hover:bg-slate-50 rounded-full"><Icon name="x" /></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-10 pt-6 custom-scrollbar">
                                    <div className="grid md:grid-cols-2 gap-10">
                                        <form onSubmit={addFinanceRecord} className="space-y-6 text-left">
                                            <div className="grid grid-cols-2 gap-2">
                                                <button type="button" onClick={() => setFinanceForm({...financeForm, type: 'income'})} className={`py-4 rounded-3xl font-black transition-all ${financeForm.type === 'income' ? 'bg-green-600 text-white shadow-xl scale-100' : 'bg-slate-50 text-slate-400 scale-95 hover:bg-slate-100'}`}> รายรับ </button>
                                                <button type="button" onClick={() => setFinanceForm({...financeForm, type: 'expense'})} className={`py-4 rounded-3xl font-black transition-all ${financeForm.type === 'expense' ? 'bg-red-600 text-white shadow-xl scale-100' : 'bg-slate-50 text-slate-400 scale-95 hover:bg-slate-100'}`}> รายจ่าย </button>
                                            </div>
                                            
                                            <div className="space-y-4">
                                                {/* Smart Dropdown สำหรับค้นหาชื่อลูกค้า */}
                                                <div className="relative z-50">
                                                    <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest px-2 block mb-1">ชื่อบุคคล / ลูกค้า</label>
                                                    <input 
                                                        type="text" 
                                                        value={financeForm.customerName} 
                                                        onChange={e => {
                                                            setFinanceForm({...financeForm, customerName: e.target.value});
                                                            setShowCustomerSuggestions(true);
                                                        }}
                                                        onClick={() => setShowCustomerSuggestions(true)}
                                                        onFocus={() => setShowCustomerSuggestions(true)}
                                                        onBlur={() => setTimeout(() => setShowCustomerSuggestions(false), 250)}
                                                        placeholder="พิมพ์ค้นหาชื่อ หรือ กรอกใหม่..." 
                                                        className="w-full px-5 py-4 bg-slate-50 rounded-2xl outline-none font-bold focus:ring-2 ring-indigo-200 transition-all border border-slate-100" 
                                                        required 
                                                        autoComplete="off"
                                                    />
                                                    
                                                    {/* กล่องแนะนำคำค้นหา (โผล่ตอนพิมพ์) */}
                                                    {showCustomerSuggestions && customerSuggestions.length > 0 && (
                                                        <div className="absolute top-full left-0 right-0 mt-2 bg-white border border-slate-200 shadow-2xl rounded-2xl z-[100] max-h-60 overflow-y-auto custom-scrollbar animate-in slide-in-from-top-2">
                                                            <div className="p-2.5 text-[10px] font-black text-indigo-500 uppercase tracking-widest bg-indigo-50/80 backdrop-blur-sm sticky top-0 border-b border-slate-100 z-10 flex items-center justify-between">
                                                                <span>ประวัติที่ค้นพบ</span>
                                                                <span className="bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded-full text-[9px]">{customerSuggestions.length} รายการ</span>
                                                            </div>
                                                            {customerSuggestions.map((s, idx) => (
                                                                <div 
                                                                    key={idx} 
                                                                    onMouseDown={(e) => {
                                                                        // ใช้ onMouseDown แทน onClick เพื่อทำงานก่อน onBlur
                                                                        e.preventDefault();
                                                                        setFinanceForm({...financeForm, customerName: s.name});
                                                                        setShowCustomerSuggestions(false);
                                                                    }} 
                                                                    className="p-4 hover:bg-indigo-50 cursor-pointer border-b border-slate-50 last:border-0 transition-all group"
                                                                >
                                                                    <div className="font-black text-sm text-slate-800 group-hover:text-indigo-700 flex items-center gap-2">
                                                                        {s.name}
                                                                        <span className={`text-[8px] px-1.5 py-0.5 rounded border ${s.type === 'finance' ? 'bg-green-50 text-green-600 border-green-200' : 'bg-blue-50 text-blue-600 border-blue-200'}`}>
                                                                            {s.type === 'finance' ? 'การเงิน' : 'คิวงาน'}
                                                                        </span>
                                                                    </div>
                                                                    <div className="flex justify-between items-center mt-1.5">
                                                                        <span className="text-[11px] font-bold text-slate-500 truncate max-w-[65%]">{s.note}</span>
                                                                        <span className="text-[9px] font-mono text-slate-400 bg-white px-2 py-1 rounded-lg border border-slate-100">{s.date ? s.date.toLocaleDateString('th-TH') : ''}</span>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>

                                                <div>
                                                    <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest px-2 block mb-1">จำนวนเงิน (บาท)</label>
                                                    <input type="number" value={financeForm.amount} onChange={e => setFinanceForm({...financeForm, amount: e.target.value})} placeholder="0.00" className="w-full px-5 py-4 bg-slate-50 rounded-2xl outline-none font-black text-2xl text-indigo-900 focus:ring-2 ring-slate-200 transition-all border border-slate-100" required />
                                                </div>

                                                <div>
                                                    <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest px-2 block mb-1">รายละเอียด / หมายเหตุ / โปรเจกต์</label>
                                                    <textarea value={financeForm.note} onChange={e => setFinanceForm({...financeForm, note: e.target.value})} placeholder="ระบุรายละเอียด..." className="w-full px-5 py-4 bg-slate-50 rounded-2xl outline-none h-24 font-bold focus:ring-2 ring-slate-200 transition-all resize-none border border-slate-100" required />
                                                </div>
                                            </div>

                                            <button type="submit" className={`w-full text-white font-black py-4 rounded-3xl shadow-xl hover:scale-[1.02] active:scale-95 transition-all ${financeForm.type === 'income' ? 'bg-green-600 hover:bg-green-700' : 'bg-red-600 hover:bg-red-700'}`}>บันทึกรายการ</button>
                                        </form>
                                        
                                        <div className="space-y-4">
                                            <h4 className="text-[10px] font-black text-slate-400 uppercase">ประวัติรายการล่าสุด</h4>
                                            <div className="max-h-[500px] overflow-y-auto pr-2 custom-scrollbar space-y-3">
                                                {financeRecords.length === 0 && <p className="text-xs text-slate-400 p-4 bg-slate-50 rounded-2xl text-center">ยังไม่มีประวัติการเงิน</p>}
                                                {financeRecords.sort((a,b) => b.date - a.date).map(rec => (
                                                    <div key={rec.id} className="p-4 bg-white border border-slate-100 shadow-sm rounded-3xl flex justify-between items-center group transition-all hover:shadow-md">
                                                        <div className="text-left flex items-start gap-3">
                                                            <div className={`w-10 h-10 rounded-full flex items-center justify-center shrink-0 mt-1 ${rec.type === 'income' ? 'bg-green-50 text-green-500' : 'bg-red-50 text-red-500'}`}>
                                                                <Icon name={rec.type === 'income' ? 'arrow-down-left' : 'arrow-up-right'} className="w-5 h-5"/>
                                                            </div>
                                                            <div>
                                                                <div className="text-[9px] text-slate-400 uppercase tracking-wide">{rec.date?.toLocaleDateString('th-TH')} • ผู้บันทึก: {rec.createdBy}</div>
                                                                <div className="text-sm font-black text-slate-800 leading-tight mt-0.5">{rec.customerName}</div>
                                                                <div className="text-xs font-bold text-slate-500 mt-1">{rec.note}</div>
                                                            </div>
                                                        </div>
                                                        <div className="flex flex-col items-end gap-1 shrink-0">
                                                            <span className={`text-lg font-black ${rec.type === 'income' ? 'text-green-600' : 'text-red-600'}`}> {rec.type === 'income' ? '+' : '-'} {rec.amount.toLocaleString()} </span>
                                                            {currentUserData?.permissions?.canDeleteAnything && <button onClick={() => triggerConfirm("ลบรายการ?", "ลบข้อมูลการเงินนี้ถาวร?", () => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('finance').doc(rec.id).delete(), 'danger')} className="opacity-0 group-hover:opacity-100 text-xs text-red-400 hover:text-red-600 hover:bg-red-50 px-2 py-1 rounded-lg transition-all flex items-center gap-1"><Icon name="trash-2" className="w-3 h-3" /> ลบ</button>}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: ADD PROJECT */}
                    {isAddingProject && (
                        <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 modal-overlay animate-in fade-in">
                            <form onSubmit={(e) => { e.preventDefault(); triggerConfirm("สร้างโปรเจกต์", "สร้างฐานข้อมูลจากฟอร์มนี้?", () => handleAddProject(e)); }} className="bg-white w-full max-w-xl rounded-[40px] shadow-2xl p-10 space-y-6">
                                <h2 className="text-2xl font-black flex items-center gap-3"><Icon name="plus-circle" className="text-indigo-600" /> เพิ่มโปรเจกต์ใหม่</h2>
                                <div className="space-y-4 text-left">
                                    <input type="text" value={inputCustomName} onChange={e => setInputCustomName(e.target.value)} placeholder="ชื่อโปรเจกต์ (ตั้งเอง)" className="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none font-bold focus:ring-2 ring-indigo-100" required />
                                    <input type="text" value={inputUrl} onChange={e => setInputUrl(e.target.value)} placeholder="URL ลิงก์ฟอร์ม" className="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none font-bold focus:ring-2 ring-indigo-100" required />
                                    <textarea value={inputHtml} onChange={e => setInputHtml(e.target.value)} placeholder="HTML Source Code (Ctrl+U)" className="w-full h-32 px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none font-mono text-[10px] focus:ring-2 ring-indigo-100" required />
                                </div>
                                <div className="flex gap-3">
                                    <button type="button" onClick={() => setIsAddingProject(false)} className="flex-1 bg-slate-100 text-slate-600 py-4 rounded-2xl font-black hover:bg-slate-200">ยกเลิก</button>
                                    <button type="submit" className="flex-[2] bg-indigo-600 text-white py-4 rounded-2xl shadow-xl font-black hover:bg-indigo-700 active:scale-95 transition-all">สร้างโปรเจกต์</button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* MODAL: VIEW TASK DATA */}
                    {selectedTask && (
                        <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 modal-overlay animate-in fade-in">
                            <div className="bg-white w-full max-w-md rounded-[40px] shadow-2xl flex flex-col max-h-[85vh] overflow-hidden" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center border-b p-8 bg-white shrink-0">
                                    <div className="text-left">
                                        <h2 className="text-xl font-black text-slate-800">{selectedTask.taskName}</h2>
                                        <span className="text-[10px] text-slate-400 uppercase tracking-widest">{selectedTask.projectCustomName}</span>
                                    </div>
                                    <button onClick={() => setSelectedTask(null)} className="p-3 hover:bg-slate-50 rounded-full"><Icon name="x" /></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-10 pt-6 custom-scrollbar text-left">
                                    {projects.find(p => p.id === selectedTask.projectId)?.fields.map((f, i) => (
                                        <div key={i} className="bg-slate-50/50 p-4 rounded-3xl border border-slate-50 mb-3 hover:bg-slate-50 transition-all">
                                            <div className="text-[10px] text-slate-400 font-bold tracking-wide">{f.label}</div>
                                            <div className="text-sm font-black text-slate-700 mt-1">{Array.isArray(selectedTask.data[f.entryId]) ? selectedTask.data[f.entryId].join(', ') : (selectedTask.data[f.entryId] || '(ว่าง)')}</div>
                                        </div>
                                    ))}
                                </div>
                                <div className="text-[9px] text-center text-slate-400 font-bold uppercase p-6 border-t tracking-widest">สร้างโดย {selectedTask.createdBy} • ตั้งเวลาส่ง {selectedTask.targetTime.toLocaleString('th-TH')}</div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
